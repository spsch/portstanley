<div id="cookie-banner" style="position:fixed;bottom:0;left:0;width:100%;background:#222;color:#fff;z-index:9999;padding:20px;display:none;">
    <div style="max-width:600px;margin:auto;">
        <p>
            Tento web používá cookies. Vyberte, které chcete povolit:
        </p>
        <form id="cookie-form">
            <label>
                <input type="checkbox" name="basic" checked disabled>
                Základní (nutné)
            </label>
            <br>
            <label>
                <input type="checkbox" name="analytic">
                Analytické
            </label>
            <br>
            <label>
                <input type="checkbox" name="preferences">
                Preferenční
            </label>
            <br><br>
            <button type="submit" style="margin-right:10px;" class="btn btn-primary btn-sm">Uložit volbu</button>
            <button type="button" id="cookie-reject" class="btn btn-secondary btn-sm">Odmítnout vše kromě nutných</button>
        </form>
    </div>
</div>
